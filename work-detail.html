<DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Noire -Work Detail</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;1,400&family=Inter;wght@300;400;500&display=swap" rel="stylesheet">
  <style>
    :root{
        --gold:#c9b37e;
        --bg:#0b0b0b;
        --text:#e0e0e0;
        --muted:#555;
    }
    body{
        background: var(--bg);
        color: var(--text);
        font-family: 'Inter',sans-serif;
        margin: 0;
    }
    nav{
        padding: 24px 60px;
        display:flex;
        justify-content: space-between;
        align-items: center;
        border-bottom: 1px solid rgba(255,255.255,0.8);
    }
    nav a{ color: white;text-decoration: none;font-size: 13px;letter-spacing: 3px;margin-right: 32px;}
    nav a:hover{color: var(--gold);}
  </style>
</head>
